
<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>它香 PetScent | 跨物种友好的芳疗科学</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'oatmeal': '#FDFBF7',   // 更洁净、明亮的燕麦底色
              'sage': '#829682',      // 更柔和、高级的鼠尾草绿
              'deep-sage': '#3A473A', // 深邃但不沉闷的绿色
              'forest': '#1B241B',    // 核心文字色
              'essence': '#D4B982',   // 植物精华金
              'petal': '#F5E6E6',
              'clay': '#A68B73',
              'fog-green': '#A7BBA7'
            },
            animation: {
              'fade-in': 'fade-in 0.8s ease-out forwards',
              'fade-in-up': 'fade-in-up 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'breathe': 'breathe 8s ease-in-out infinite',
            },
            keyframes: {
              'fade-in': {
                'from': { opacity: '0' },
                'to': { opacity: '1' },
              },
              'fade-in-up': {
                'from': { opacity: '0', transform: 'translateY(20px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              },
              'breathe': {
                '0%, 100%': { opacity: '0.9', transform: 'scale(1)' },
                '50%': { opacity: '1', transform: 'scale(1.02)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Montserrat', 'Noto Serif SC', serif;
        background-color: #FDFBF7;
        color: #1B241B;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      
      .glass-nav {
        background: rgba(253, 251, 247, 0.9);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(130, 150, 130, 0.15);
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #FDFBF7;
      }
      ::-webkit-scrollbar-thumb {
        background: #829682;
        border-radius: 10px;
      }

      h1, h2, h3 {
        letter-spacing: -0.01em;
      }
      
      .text-balance {
        text-wrap: balance;
      }
    </style>
